# CI — RTL lint only
#
# Runs on every push/PR to main. Uses GitHub-hosted Ubuntu runners
# so the MacBook Air doesn't have to suffer through Verilator C++ builds.
#
# All jobs build Verilator from source (cached) because the apt package
# on ubuntu-latest ships an ancient version (~5.006) that can't handle
# our SystemVerilog features.
#
# NOTE: cocotb and UVM jobs are temporarily disabled while tb/ is updated
# to reflect the new kc705_top.sv integration. Lint remains the only
# required gate for PRs to land.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  VERILATOR_CACHE_KEY: verilator-v5.046-noccache

jobs:
  # ── Build Verilator (shared cache for all jobs) ───────────────────
  build-verilator:
    runs-on: ubuntu-latest
    steps:
      - name: Cache Verilator
        id: cache
        uses: actions/cache@v4
        with:
          path: /tmp/verilator-install
          key: ${{ env.VERILATOR_CACHE_KEY }}-${{ runner.os }}

      - name: Install build deps
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git autoconf g++ flex bison \
            libfl-dev zlib1g-dev help2man

      - name: Build Verilator from source
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v5.046 \
            https://github.com/verilator/verilator.git /tmp/verilator-src
          cd /tmp/verilator-src
          autoconf
          ./configure --prefix=/tmp/verilator-install
          make -j$(nproc)
          make install

  # ── RTL lint ──────────────────────────────────────────────────────
  lint:
    needs: build-verilator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Restore Verilator
        uses: actions/cache@v4
        with:
          path: /tmp/verilator-install
          key: ${{ env.VERILATOR_CACHE_KEY }}-${{ runner.os }}

      - name: Lint kc705_top (full hierarchy, KINTEX7_SIM_GTX_BYPASS)
        run: |
          export PATH="/tmp/verilator-install/bin:$PATH"
          verilator --version
          verilator --lint-only -Wall -sv \
            --top-module kc705_top \
            -DKINTEX7_SIM_GTX_BYPASS \
            -Wno-WIDTHEXPAND -Wno-WIDTHTRUNC -Wno-BLKSEQ -Wno-PROCASSINIT \
            -Wno-GENUNNAMED -Wno-TIMESCALEMOD -Wno-PINCONNECTEMPTY \
            -Wno-PINMISSING -Wno-LATCH -Wno-UNUSEDSIGNAL \
            -Wno-CASEINCOMPLETE -Wno-SELRANGE -Wno-UNUSEDPARAM \
            -Wno-UNOPTFLAT \
            rtl/lliu_pkg.sv \
            rtl/bfloat16_mul.sv \
            rtl/fp32_acc.sv \
            rtl/dot_product_engine.sv \
            rtl/weight_mem.sv \
            rtl/output_buffer.sv \
            rtl/lliu_core.sv \
            rtl/itch_field_extract.sv \
            rtl/itch_parser_v2.sv \
            rtl/order_book.sv \
            rtl/symbol_filter.sv \
            rtl/feature_extractor_v2.sv \
            rtl/strategy_arbiter.sv \
            rtl/risk_check.sv \
            rtl/ouch_engine.sv \
            rtl/ptp_core.sv \
            rtl/timestamp_tap.sv \
            rtl/latency_histogram.sv \
            rtl/lliu_top_v2.sv \
            rtl/moldupp64_strip.sv \
            rtl/eth_axis_rx_wrap.sv \
            rtl/kc705_top.sv \
            lib/verilog-ethernet/rtl/eth_axis_rx.v \
            lib/verilog-ethernet/rtl/udp_complete_64.v \
            lib/verilog-ethernet/rtl/ip_complete_64.v \
            lib/verilog-ethernet/rtl/ip.v \
            lib/verilog-ethernet/rtl/ip_64.v \
            lib/verilog-ethernet/rtl/ip_eth_rx_64.v \
            lib/verilog-ethernet/rtl/ip_eth_tx_64.v \
            lib/verilog-ethernet/rtl/arp.v \
            lib/verilog-ethernet/rtl/arp_cache.v \
            lib/verilog-ethernet/rtl/arp_eth_rx.v \
            lib/verilog-ethernet/rtl/arp_eth_tx.v \
            lib/verilog-ethernet/rtl/eth_arb_mux.v \
            lib/verilog-ethernet/rtl/ip_arb_mux.v \
            lib/verilog-ethernet/rtl/udp_64.v \
            lib/verilog-ethernet/rtl/udp_ip_rx_64.v \
            lib/verilog-ethernet/rtl/udp_ip_tx_64.v \
            lib/verilog-ethernet/rtl/udp_checksum_gen_64.v \
            lib/verilog-ethernet/rtl/lfsr.v \
            lib/verilog-ethernet/lib/axis/rtl/axis_async_fifo.v \
            lib/verilog-ethernet/lib/axis/rtl/axis_fifo.v \
            lib/verilog-ethernet/lib/axis/rtl/arbiter.v \
            lib/verilog-ethernet/lib/axis/rtl/priority_encoder.v

  # ── cocotb block-level tests (kc705_top migration, no lliu_top obligation) ──
  cocotb:
    needs: build-verilator
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - toplevel: symbol_filter
            test_module: test_symbol_filter
          - toplevel: moldupp64_strip
            test_module: test_moldupp64_strip
    steps:
      - uses: actions/checkout@v4

      - name: Restore Verilator
        uses: actions/cache@v4
        with:
          path: /tmp/verilator-install
          key: ${{ env.VERILATOR_CACHE_KEY }}-${{ runner.os }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cocotb
        run: pip install cocotb

      - name: Install system deps (for Verilator C++ compilation)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y g++ make

      - name: Run ${{ matrix.toplevel }} tests
        working-directory: tb/cocotb
        run: |
          export PATH="/tmp/verilator-install/bin:$PATH"
          make SIM=verilator TOPLEVEL=${{ matrix.toplevel }} \
               TEST_MODULE=${{ matrix.test_module }}

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cocotb-results-${{ matrix.toplevel }}
          path: tb/cocotb/results.xml
